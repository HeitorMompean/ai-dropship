version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: dropship_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dropship
      POSTGRES_PASSWORD: dropship
      POSTGRES_DB: dropship
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dropship -d dropship"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dropship_network

  redis:
    image: redis:7-alpine
    container_name: dropship_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dropship_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dropship_backend
    restart: unless-stopped
    ports:
      - "8090:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://dropship:dropship@postgres:5432/dropship
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    env_file:
      - .env
    volumes:
      - ./:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dropship_network
    command: >
      sh -c "echo 'Waiting for DB...' && sleep 5 && echo 'Starting server...' && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

networks:
  dropship_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
